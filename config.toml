# =============================================================
# store-zip 設定ファイル  (config.toml)
# =============================================================
# store-zip.exe と同じフォルダに置いてください。
#
# [設定の仕組み]
#   config.toml  … 手動で管理する静的な設定
#   decisions.json … 対話的に「保持/削除」を選んだ内容が自動保存される
#
# decisions.json の内容は config.toml より優先されます（allow_patterns）。
# 設定を変更したい場合はこのファイルを編集するか、decisions.json を削除して
# 次回起動時に再判定させてください。
# =============================================================

# -------------------------------------------------------------
# 未分類ファイルの処理方針
#   "ask"  : ユーザーに確認する（デフォルト・推奨）
#   "keep" : すべて自動保持（確認しない）
#   "junk" : すべて自動削除（確認しない）
#
# 初回実行時は "ask" で動作を確認し、安定したら "keep" に変えるなど
# 用途に応じて変更してください。
# -------------------------------------------------------------
unknown_file_action = "ask"

# -------------------------------------------------------------
# 変換後のZIPと同名ファイルが存在した場合の命名規則
#   "counter" : archive (1).zip, archive (2).zip ...
#   "date"    : archive_20241225.zip
#               （それでも重複なら archive_20241225 (1).zip）
# -------------------------------------------------------------
duplicate_name_style = "counter"

# -------------------------------------------------------------
# 保持を強制するパターン（junk_patterns より優先）
# ここに追加したファイル名は削除されません。
# glob 形式（*.jpg, README.* など）も使用できます。
#
# ※ 対話的に「保持」を選択したものは decisions.json に自動追加されます。
# -------------------------------------------------------------
allow_patterns = [
    # ── 画像ファイル ────────────────────────────────────────
    "*.jpg", "*.jpeg", "*.jpe", "*.jfif",
    "*.png",
    "*.gif",
    "*.bmp", "*.dib",
    "*.webp",
    "*.tif", "*.tiff",
    "*.avif",
    "*.heic", "*.heif",
    "*.svg", "*.svgz",
    # RAW 形式
    "*.raw", "*.cr2", "*.cr3", "*.nef", "*.nrw",
    "*.arw", "*.srf", "*.sr2",
    "*.orf", "*.rw2", "*.dng",
    "*.pef", "*.ptx", "*.raf",
]

# -------------------------------------------------------------
# ゴミファイルのパターン（glob 形式、ファイル名のみでマッチ）
#
# ※ 対話的に「削除」を選択したものは decisions.json に自動追加されます。
# -------------------------------------------------------------
junk_patterns = [
    # Windows システムファイル
    "Thumbs.db",
    "desktop.ini",
    "ehthumbs.db",

    # macOS
    ".DS_Store",
    ".AppleDouble",
    ".LSOverride",
    "._*",

    # ショートカット・リンク系
    "*.url",
    "*.lnk",
    "*.webloc",

    # ビューア系のメタデータ
    "ComicInfo.xml",
    "series.json",

    # NFO / SFV（アーカイブ情報ファイル）
    "*.nfo",
    "*.sfv",

    # トレントファイル
    "*.torrent",
]

# -------------------------------------------------------------
# ゴミディレクトリのパターン（ディレクトリ名でマッチ）
# 一致するディレクトリはその中身ごと削除されます。
# -------------------------------------------------------------
junk_dirs = [
    "__MACOSX",
    ".git",
    ".svn",
]

# -------------------------------------------------------------
# ZIP内の空フォルダを削除するか
#   true  : 空フォルダを削除する（デフォルト）
#   false : 空フォルダをそのまま維持する
# -------------------------------------------------------------
remove_empty_dirs = true

# -------------------------------------------------------------
# 変換後のZIPに元ファイルの更新日時を引き継ぐか
#   true  : 元ファイルの更新日時を維持する（デフォルト）
#   false : 変換処理を行った日時をそのまま使う
# -------------------------------------------------------------
preserve_timestamp = true

# -------------------------------------------------------------
# ログファイルを残すか（true にすると store-zip.log を生成）
# -------------------------------------------------------------
write_log = false

# -------------------------------------------------------------
# 処理開始前のファイル一覧の表示件数上限
#   0 : 制限なし（デフォルト）
#   n : 先頭 n 件のみ表示し、残りは「... 他 n ファイル」と表示
# -------------------------------------------------------------
file_list_limit = 0

# -------------------------------------------------------------
# 出力フォーマット
#   "zip" : 無圧縮 ZIP（デフォルト）
#   "rar" : 無圧縮 RAR + リカバリーレコード
#           ※ WinRAR (rar.exe) のインストールが必要
#           ※ https://www.rarlab.com/
# -------------------------------------------------------------
output_format = "zip"

# -------------------------------------------------------------
# リカバリーレコードの割合（%）
# output_format = "rar" のときのみ有効。1〜100 で指定。
# 例: 5 → ファイルサイズの 5% 分まで破損を修復可能
# -------------------------------------------------------------
rar_recovery_record = 5

# -------------------------------------------------------------
# rar.exe のパスを明示指定する場合のみ設定
# 空文字（デフォルト）の場合は自動検索:
#   1. store-zip.exe と同じフォルダ
#   2. C:\Program Files\WinRAR\rar.exe
#   3. C:\Program Files (x86)\WinRAR\rar.exe
#   4. PATH
# 例: rar_exe_path = 'D:\Tools\WinRAR\rar.exe'
# -------------------------------------------------------------
rar_exe_path = ""

# -------------------------------------------------------------
# 同名・同内容の出力ファイルが既に存在する場合の動作
#   true  : 重複とみなし新ファイルを破棄してスキップ（デフォルト）
#           元ファイルの削除失敗による二重変換を防ぐ
#   false : duplicate_name_style に従いリネームして保存
# -------------------------------------------------------------
skip_if_same_size = true
